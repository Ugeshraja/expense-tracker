<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>

    <!--
      Bootstrap 5 CDN
      We load Bootstrap from the internet so we can use
      its pre-built CSS classes for styling our components.
      Classes like: btn, table, form-control, navbar, etc.
    -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      div id="root"
      React injects the entire app into this single div.
      Everything you see in the browser is rendered here
      by React — this HTML file itself stays mostly empty.
    -->
    <div id="root"></div>
  </body>
</html>
