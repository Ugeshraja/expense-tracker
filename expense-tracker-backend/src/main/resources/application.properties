# =====================================================
# APPLICATION.PROPERTIES
# This file is the configuration file for Spring Boot.
# It tells Spring Boot:
#   - Which port to run on
#   - How to connect to MySQL
#   - How to handle the database tables
# =====================================================


# -------------------------------------------------------
# SERVER CONFIGURATION
# This sets the port number our backend will run on.
# Default is 8080. React will send requests to this port.
# -------------------------------------------------------
server.port=8080


# -------------------------------------------------------
# MYSQL DATABASE CONNECTION
# Replace 'root' and 'your_password' with your actual
# MySQL username and password.
#
# expense_tracker = the database we created in MySQL
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# -------------------------------------------------------
# JPA / HIBERNATE CONFIGURATION
#
# hibernate.ddl-auto=update
#   → This tells Hibernate (the JPA tool) to automatically
#     CREATE or UPDATE the 'expenses' table based on our
#     Expense entity class. Very useful during development!
#     Options: create, create-drop, update, validate, none
#
# show-sql=true
#   → Prints the SQL queries in the terminal so you can
#     see what's happening in the background
#
# format_sql=true
#   → Makes the printed SQL easier to read
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# -------------------------------------------------------
# CORS is handled in the Controller, but just so you know:
# React runs on port 3000, Backend runs on port 8080.
# They are on different ports = "Cross Origin" = we need
# to explicitly allow React to talk to Spring Boot.
# -------------------------------------------------------
